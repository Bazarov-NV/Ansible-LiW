---
- name: Create tools directory if it doesn't exist
  ansible.windows.win_file:
    path: "{{ antor_tools_folder }}"
    state: directory

- name: Set rights tools folder
  win_acl:
    path: "{{ antor_tools_folder }}"
    user: "{{ user_antor }}"
    rights: FullControl
    state: present
    type: allow

- name: 7z utils on repo host
  shell: 7z a -r -up1q1r2x1y1z1w1 ~/utils_liw.7z {{ repo_utils_mnt }}/
  register: q1
  delegate_to: 127.0.0.1
  run_once: true
  tags: test

- name: Copy 7z utils to target host
  win_copy:
    src: "~/utils_liw.7z"
    dest: "{{ distr_folder_host }}\\utils_liw.7z"
  tags: test

- name: Extract all utils to distr folder
  win_shell: 7z x "{{ distr_folder_host }}\utils_liw.7z" -o"{{ distr_folder_host }}" -aoa
  tags: test

# - name: Download utils distr from FTP
#   win_shell: wget {{ftp_server_repo}}/{{ftp_folder_repo}}/{{tools_file_7z}} -O "{{distr_folder_host}}\\{{tools_file_7z}}"

# - name: Extract all utils 7z to tools folder
#   win_shell: 7z x "{{ distr_folder_host }}\\{{ tools_file_7z }}" -o"{{ distr_folder_host }}" -aoa

- name: Extract utils
  win_shell: 7z x "{{ distr_folder_host }}\{{ repo_utils_folder }}\{{ item.zip_name }}" -o"{{ item.path }}" -aoa
  loop: "{{ tools_list }}"
  loop_control:
    label: "{{ item.zip_name }}"  
  when: item.zip_name | length > 0

- name: Install utils
  win_shell: "{{ item.install_script }}"
  loop: "{{ tools_list }}"
  loop_control:
    label: "{{ item.tool_name }} --- {{ item.install_script }}"
  when: item.install

- name: Create an application shortcut on the desktop
  community.windows.win_shortcut:
    src: "{{ item.path }}\\{{ item.exe_name }}"
    dest: C:\Users\{{ user_adm_antor }}\Desktop\{{ item.tool_name }}.lnk
    icon: "{{ item.icon_path}},0"
  loop: "{{ tools_list }}"
  loop_control:
    label: "{{ item.path }}\\{{ item.exe_name }}"
  when: item.shortcut

- name: Create scheduled task "Background info"
  community.windows.win_scheduled_task:
    name: Background info
    description: Background info at startup
    display_name: Background info
    hidden: true
    actions:
      - path: "{{ antor_tools_folder }}\\bginfo\\bginfo64.exe"
        arguments: "{{ antor_tools_folder }}\\bginfo\\bg_config.bgi /timer:0 /nolicprompt"
    triggers:
      - type: logon
      - type: boot
    user_id: "{{ user_adm_antor }}"
    author: "{{ user_adm_antor }}"
    username: "{{ user_adm_antor }}"
    password: "{{ passw_adm_antor }}"
    logon_type: interactive_token
    state: present
    enabled: true

# - name: Install Google Chrome via Chocolatey
#   win_chocolatey:
#     name: googlechrome
#     state: present

- name: Reboot server tools
  ansible.windows.win_reboot:

- name: Set fact component installed
  set_fact:
    tools_installed: true
