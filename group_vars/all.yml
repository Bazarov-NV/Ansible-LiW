    test_command:
      - "curl http://{{ ext_ip_address_host }}:{{ http_port_ae_site }}/LiwAPI/Service.svc/hello"
      - "curl -k https://{{ ext_ip_address_host }}:{{ https_port1_ae_site }}/LiwAPI/Service.svc/hello"
  - name: "MSession"
    repo_path: "/MSession"
    install_dir: "{{ iis_folder }}\\MSession"
