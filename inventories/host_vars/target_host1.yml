# Далее переменные для контроля процесса установки
#
# значение всем этим переменным можно задавать в командной строке при запуске ansible-playbook используя опцию -e(или --extra_vars)
# например:
#
#  ansible-playbook -i ./inventories/hosts.ini all.yml -e '{"silence_mode":true, "list_components": ["liw_services","fuel_card","ppsvc"], 
#                                                           "antor_cert_installed": true, "iis_installed": true, "iis_ent_site_installed": true}'
#
# Устанавливаем все возможные компоненты
all_install: false
#Список указаывает какие компоненты будем ставить на этом хосте
#если установлен "all_install=true", то этот список будет игнорироваться
list_components:
  - "preconfig"
  - "tools"
  - "iis"
  - "iis_ent_site"
  - "iis_ftp"
  - "iis_webdav"
  - "ae_gateway"
  - "ae_reportsservice"
  - "liw_services"
  - "fuel_card"
  - "ppsvc"
#Переменные контроля установленных компонент. Значения присваиваются в процессе выполнения срипта
preconfig_installed: false
tools_installed: false
iis_installed: false
iis_ent_site_installed: false
ftp_installed: false
webdav_installed: false
aegateway_installed: false
aereports_installed: false
liw_services_installed: false
fuel_card_installed: false
ppsvc_installed: false
antor_cert_installed: false
sql_server_installed: false
