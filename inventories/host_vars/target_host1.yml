# Далее переменные для контроля процесса установки
#
# значение всем этим переменным можно задавать в командной строке при запуске ansible-playbook используя опцию -e(или --extra_vars)
# например:
#
#  ansible-playbook -i ./inventories/hosts.ini all.yml -e '{"silence_mode":true, "list_components": ["liw_services","fuel_card","ppsvc"], 
#                                                           "antor_cert_installed": true, "iis_installed": true, "iis_ent_site_installed": true}'
#
# Устанавливаем все возможные компоненты
